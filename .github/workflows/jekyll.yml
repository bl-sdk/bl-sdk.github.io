# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      skip-htmlproofer:
        description: 'Skips running htmlproofer'
        type: boolean

  pull_request:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4' # Not needed with a .ruby-version file
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 1 # Increment this number if you need to re-download cached gems

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build with Jekyll
        run: ./_jekyll.py merge
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        if: github.ref == 'refs/heads/master' && github.repository == 'bl-sdk/bl-sdk.github.io'
        uses: actions/upload-pages-artifact@v5
        with:
          path: _merged_site/

      - name: Run HTMLProofer
        if: ${{ !inputs.skip-htmlproofer }}
        run: >
          bundle exec htmlproofer _merged_site
          --ignore-files "/_merged_site\\/(oak|oak2|willow1|willow2)-mod-db\\/mods/"
          --swap-urls "https\://bl-sdk.github.io/:/"

  spelling:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Check spelling
      uses: crate-ci/typos@master

  validate_pyproject:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request'
      || (github.ref == 'refs/heads/master'
          && github.repository == 'bl-sdk/bl-sdk.github.io')

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 50

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        cache-dependency-glob: |
          **/*requirements*.txt
          **/*requirements*.in
          **/*constraints*.txt
          **/*constraints*.in
          **/pyproject.toml
          **/uv.lock
          **/*.py.lock
          _validate_pyproject.py

    - name: Validate all `pyprojects.toml`s
      if: ${{ github.event_name != 'pull_request' }}
      run: uv run ./_validate_pyproject.py all
      continue-on-error: true

    - name: Validate changed files' `pyprojects.toml`s
      if: ${{ github.event_name == 'pull_request' }}
      run: >
        uv run ./_validate_pyproject.py git_changed
        $(git merge-base ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }})

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.repository == 'bl-sdk/bl-sdk.github.io'

    needs:
    - build
    - spelling

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
